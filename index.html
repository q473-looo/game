<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>逃げろゲーム（障害物あり）</title>

<style>
body{
    margin:0;
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
}

#game{
    width:800px;
    height:500px;
    background:#eee;
    position:relative;
    overflow:hidden;
    border:4px solid #000;
}

.player{
    width:30px;
    height:30px;
    background:blue;
    position:absolute;
}

.enemy{
    width:30px;
    height:30px;
    background:red;
    position:absolute;
}

.obstacle{
    position:absolute;
    background:#666;
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    font-size:20px;
}
</style>
</head>

<body>

<div id="game">
    <div id="score">Score: 0</div>
    <div id="player" class="player"></div>
    <div id="enemy" class="enemy"></div>

    <!-- 障害物 -->
    <div class="obstacle" style="left:200px;top:100px;width:150px;height:30px;"></div>
    <div class="obstacle" style="left:400px;top:250px;width:30px;height:150px;"></div>
    <div class="obstacle" style="left:100px;top:350px;width:200px;height:30px;"></div>
</div>

<script>

const player = document.getElementById("player")
const enemy = document.getElementById("enemy")
const scoreText = document.getElementById("score")
const obstacles = document.querySelectorAll(".obstacle")

let playerX = 50
let playerY = 50

let enemyX = 700
let enemyY = 400

let score = 0

const keys = {}

document.addEventListener("keydown",e=>{
    keys[e.key] = true
})

document.addEventListener("keyup",e=>{
    keys[e.key] = false
})

function isColliding(rect1,rect2){
    return(
        rect1.left < rect2.right &&
        rect1.right > rect2.left &&
        rect1.top < rect2.bottom &&
        rect1.bottom > rect2.top
    )
}

function movePlayer(){

    let newX = playerX
    let newY = playerY

    if(keys["ArrowLeft"]) newX -= 4
    if(keys["ArrowRight"]) newX += 4
    if(keys["ArrowUp"]) newY -= 4
    if(keys["ArrowDown"]) newY += 4

    player.style.left = newX + "px"
    player.style.top = newY + "px"

    let playerRect = player.getBoundingClientRect()

    let hit = false

    obstacles.forEach(o=>{
        if(isColliding(playerRect,o.getBoundingClientRect())){
            hit = true
        }
    })

    if(!hit){
        playerX = newX
        playerY = newY
    }

    player.style.left = playerX + "px"
    player.style.top = playerY + "px"
}

function moveEnemy(){

    let dx = playerX - enemyX
    let dy = playerY - enemyY
    let dist = Math.sqrt(dx*dx + dy*dy)

    enemyX += dx/dist * 1.8
    enemyY += dy/dist * 1.8

    enemy.style.left = enemyX + "px"
    enemy.style.top = enemyY + "px"
}

function checkGameOver(){

    const p = player.getBoundingClientRect()
    const e = enemy.getBoundingClientRect()

    if(isColliding(p,e)){
        alert("ゲームオーバー！ Score: "+score)
        location.reload()
    }
}

function update(){

    movePlayer()
    moveEnemy()
    checkGameOver()

    score++
    scoreText.textContent = "Score: "+score

    requestAnimationFrame(update)
}

update()

</script>

</body>
</html>
